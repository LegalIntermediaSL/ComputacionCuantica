name: Build Jupyter Book

on:
  push:
    branches: [main]
    paths:
      - "Tutorial/**"
      - "Cuadernos/**"
      - "Ejercicios/**"
      - "docs/**"
      - "_config.yml"
      - "_toc.yml"
  workflow_dispatch:

jobs:
  build-book:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Jupyter Book
        run: |
          pip install --upgrade pip
          pip install \
            jupyter-book>=1.0 \
            myst-parser \
            sphinx-book-theme \
            sphinx-proof

      - name: Build Jupyter Book
        run: jupyter-book build . --all

      - name: Upload book artifact
        uses: actions/upload-artifact@v4
        with:
          name: jupyter-book-html
          path: _build/html/
          retention-days: 30
