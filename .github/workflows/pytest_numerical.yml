name: Pytest — Validación numérica de notebooks

on:
  push:
    branches: [main]
    paths:
      - "tests/**"
      - "Cuadernos/**/*.ipynb"
      - "Tutorial/**/*.md"
      - ".github/workflows/pytest_numerical.yml"
  pull_request:
    branches: [main]

jobs:
  pytest-numerical:
    name: Tests numéricos con pytest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "qiskit>=2.0,<3.0" \
            "qiskit-aer>=0.15" \
            numpy \
            scipy \
            matplotlib \
            pytest \
            pytest-timeout \
            pytest-cov \
            scikit-learn \
            networkx

      - name: Run numerical validation tests
        run: |
          pytest tests/test_numerical_notebooks.py \
            -v \
            --timeout=60 \
            --tb=short \
            --color=yes \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            .pytest_cache/
            coverage.xml
          retention-days: 7
