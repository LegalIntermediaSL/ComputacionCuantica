site_name: Computación Cuántica — Teoría y Práctica
site_description: Curso completo de computación cuántica en español con Qiskit 2.0
site_author: LegalIntermediaSL
site_url: https://legalintermediasl.github.io/ComputacionCuantica/

repo_name: LegalIntermediaSL/ComputacionCuantica
repo_url: https://github.com/LegalIntermediaSL/ComputacionCuantica

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: es
  - mkdocstrings

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - tables

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Inicio: index.md
  - Ruta de Estudio: ruta_de_estudio.md
  - Glosario: glosario.md
  - Fundamentos:
    - Módulo 01 — Qubits y estados: Tutorial/01_fundamentos/README.md
    - Módulo 02 — Qiskit básico: Tutorial/02_qiskit_basico/README.md
    - Módulo 04 — Qiskit Runtime: Tutorial/04_qiskit/README.md
  - Algoritmos:
    - Módulo 05 — Algoritmos clásicos: Tutorial/05_algoritmos/README.md
    - Módulo 11 — Variacionales (VQE/QAOA): Tutorial/11_algoritmos_variacionales/README.md
    - Módulo 12 — Aplicaciones e industria: Tutorial/12_aplicaciones/README.md
  - Ruido y Corrección:
    - Módulo 06 — Ruido y hardware: Tutorial/06_ruido_y_hardware/README.md
    - Módulo 09 — Corrección de errores: Tutorial/09_correccion_errores/README.md
    - Módulo 14 — Surface codes: Tutorial/14_surface_codes_y_horizonte_fault_tolerant/README.md
  - Teoría Avanzada:
    - Módulo 16 — Canales cuánticos: Tutorial/16_canales_cuanticos_y_ruido/README.md
    - Módulo 22 — Recursos cuánticos: Tutorial/22_recursos_cuanticos/README.md
    - Módulo 26 — ZX-Calculus: Tutorial/26_calculo_grafico_y_zx_calculus/README.md
  - Fronteras:
    - Módulo 28 — Aplicaciones emergentes: Tutorial/28_aplicaciones_emergentes/README.md
    - Módulo 29 — Fault-Tolerant: Tutorial/29_fault_tolerant_computing/README.md
    - Módulo 30 — Quantum Advantage: Tutorial/30_quantum_advantage_casos_reales/README.md
  - QSVT y Fronteras:
    - Módulo 38 — Quantum Sensing: Tutorial/38_quantum_sensing/README.md
    - Módulo 39 — Compilación avanzada: Tutorial/39_compilacion_avanzada/README.md
    - Módulo 40 — QSVT: Tutorial/40_qsvt/README.md
  - Laboratorios:
    - Lab 32 — Química UCCSD: Cuadernos/laboratorios/README.md
    - Lab 33 — Compilación t|ket⟩: Cuadernos/laboratorios/README.md
    - Lab 34 — Quantum Walks: Cuadernos/laboratorios/README.md
    - Lab 35 — Computación Adiabática: Cuadernos/laboratorios/README.md
    - Lab 36 — Nuevos Qubits: Cuadernos/laboratorios/README.md
    - Lab 37 — Redes Cuánticas QKD: Cuadernos/laboratorios/README.md
    - Lab 38 — Quantum Finance: Cuadernos/laboratorios/README.md
    - Lab 39 — Química + Hardware: Cuadernos/laboratorios/README.md
    - Lab 40 — QML Real: Cuadernos/laboratorios/README.md
    - Lab 41 — Advantage Cuántica: Cuadernos/laboratorios/README.md
  - Práctica:
    - Ejercicios básicos: Ejercicios/ejercicios_basicos.md
    - Ejercicios intermedios: Ejercicios/ejercicios_intermedios.md
    - Ejercicios avanzados: Ejercicios/ejercicios_avanzados.md
    - Ejercicios de investigación: Ejercicios/ejercicios_investigacion.md
    - Soluciones R1-R8: Soluciones/investigacion/README.md
  - Contribuir: CONTRIBUTING.md
